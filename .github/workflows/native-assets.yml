name: native llama.cpp assets

on:
  workflow_dispatch:
    inputs:
      llama_ref:
        description: llama.cpp tag or commit to build
        required: true
        default: 64b38b561b987679c4e1c6231f93860d3eec2638

jobs:
  build-native:
    name: Build, smoke test, and pack ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-14
            rid: osx-arm64

    steps:
      - name: Checkout Bubo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build, smoke test, and pack native asset
        shell: pwsh
        run: ./scripts/test-native-package.ps1 -Rid '${{ matrix.rid }}' -Ref '${{ inputs.llama_ref }}' -Configuration Release -BuildNative

      - name: Upload native asset
        uses: actions/upload-artifact@v4
        with:
          name: llama-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}
          if-no-files-found: error

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.rid }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
